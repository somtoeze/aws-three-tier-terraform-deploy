name: Cleanup - Destroy AWS Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm you want to tear down all infrastructure'
        required: true
        default: ''

permissions:
  contents: write
  id-token: write

jobs:
  destroy:
    runs-on: [self-hosted, linux, terraform]
    if: github.event.inputs.confirm_destroy == 'destroy'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Install kubectl and helm
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Terraform Init
        run: terraform init

      - name: Authenticate to EKS Cluster
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }} || true

      - name: Uninstall Helm releases (removes AWS Load Balancers)
        continue-on-error: true
        run: |
          helm uninstall nginx-ingress --namespace ingress-nginx --wait=false || true
          helm uninstall cert-manager --namespace cert-manager --wait=false || true
          helm uninstall argocd --namespace argocd --wait=false || true

      - name: Wait for NLB to be fully deleted before destroying VPC
        run: |
          echo "Waiting for AWS NLB to be deleted..."
          for i in $(seq 1 24); do
            COUNT=$(aws elbv2 describe-load-balancers --region ${{ secrets.AWS_REGION }} \
              --query "length(LoadBalancers[?contains(DNSName, 'elb')])" --output text 2>/dev/null || echo 0)
            if [ "$COUNT" = "0" ]; then
              echo "NLB deleted. Proceeding."
              break
            fi
            echo "NLB still exists, waiting 15s... ($i/24)"
            sleep 15
          done

      - name: Remove Helm releases from Terraform state
        continue-on-error: true
        run: |
          terraform state rm 'module.eks-deployment.helm_release.nginx_ingress' || true
          terraform state rm 'module.eks-deployment.helm_release.cert_manager' || true
          terraform state rm 'module.eks-deployment.helm_release.argocd' || true

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
